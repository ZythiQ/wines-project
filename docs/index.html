<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zach's Wine Space</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; color: #ccc; }
    canvas { display: block; }
    a { font-size: 12px; color: #667; text-decoration: none; cursor: pointer; }
    a:hover { color: #99a; text-decoration: underline; }

    /* Tooltip: */
    #tooltip {
      position: absolute;
      background: rgba(12, 12, 20, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      padding: 14px 18px;
      pointer-events: none;
      display: none;
      max-width: 340px;
      min-width: 240px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      z-index: 100;
      line-height: 1.5;
    }
    #tooltip .tt-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 4px;
    }
    #tooltip .tt-header h3 {
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      flex: 1;
      line-height: 1.3;
    }
    #tooltip .tt-rating {
      font-size: 16px;
      flex-shrink: 0;
      line-height: 1;
      filter: grayscale(100%) brightness(1.8);
      opacity: 0.85;
    }
    #tooltip .row { font-size: 12px; color: #aaa; }
    #tooltip .row span { color: #ddd; }
    #tooltip .tags { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 4px; }
    #tooltip .tag {
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 11px;
      color: #bbb;
    }
    #tooltip .divider { border-top: 1px solid rgba(255,255,255,0.08); margin: 7px 0; }

    /* Left panel: */
    #left-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      max-height: calc(100vh - 32px);
    }
    #hud { margin-bottom: 8px; }
    #hud h1 { font-size: 20px; color: #fff; font-weight: 700; margin-bottom: 2px; }
    #hud .hud-btn-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
    .hud-icon-btn {
      background: none;
      border: none;
      padding: 2px;
      cursor: pointer;
      color: #667;
      opacity: 0.5;
      transition: opacity 0.2s;
      line-height: 1;
      display: flex;
      align-items: center;
    }
    .hud-icon-btn.active { color: #fff; }
    .hud-icon-btn:hover { opacity: 1; }
    
    .hud-icon-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Search bar: */
    #hud .search-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      margin-right: 4px;
      margin-top: 8px;
    }
    #hud .search-wrap input {
      background: #1a1a24;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #ddd;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      padding: 3px 36px 3px 8px;
      width: 180px;
      height: 20px;
      color-scheme: dark;
    }
    #hud .search-wrap input::placeholder {
      color: #667;
    }
    #hud .search-wrap input:hover,
    #hud .search-wrap input:focus {
      border-color: rgba(255,255,255,0.25);
    }
    #hud .search-wrap .search-ghost {
      position: absolute;
      left: 9px;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      font-size: 12px;
      color: #555;
      pointer-events: none;
      white-space: pre;
      font-family: inherit;
    }
    #hud .search-wrap .search-count {
      position: absolute;
      right: 8px;
      top: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      font-size: 11px;
      color: #667;
      pointer-events: none;
      font-variant-numeric: tabular-nums;
    }

    /* Left controls: */
    .ctrl-row select {
      background: #1a1a24;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      color: #ddd;
      font-size: 12px;
      height: 20px;
      cursor: pointer;
      outline: none;
      color-scheme: dark;
      margin-bottom: 8px;
    }
    .ctrl-row select:hover { border-color: rgba(255,255,255,0.25); }
    .ctrl-row select option { background: #1a1a24; color: #ddd; }

    #legend {
      flex: 1;
      overflow-y: auto;
      font-size: 12px;
      direction: rtl;
      padding-right: 6px;
    }
    #legend > * { direction: ltr; }
    #legend::-webkit-scrollbar { width: 4px; }
    #legend::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
    .legend-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Info icon */
    #info-btn {
      position: relative;
      display: flex;
      align-items: center;
      cursor: pointer;
      color: #fff;
      opacity: 0.5;
      transition: opacity 0.2s;
      line-height: 1;
    }
    #info-btn svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    #info-popup {
      position: absolute;
      top: 28px;
      left: 0;
      background: rgba(12, 12, 20, 0.95);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      padding: 14px 18px;
      display: none;
      max-width: 340px;
      min-width: 240px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
      z-index: 100;
      line-height: 1.5;
      font-size: 12px;
      color: #aaa;
      pointer-events: none;
    }
    #info-btn:hover { opacity: 1; }
    #info-btn:hover #info-popup { display: block; }
    #info-popup h4 { color: #fff; font-size: 13px; margin-bottom: 6px; }
    #info-popup .divider { border-top: 1px solid rgba(255,255,255,0.08); margin: 7px 0; }
    #info-popup .row span { color: #ddd; }

    /* Right controls: */
    #controls {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
    }
    .right-ctrl-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #888;
    }
    .right-ctrl-row input[type="checkbox"] {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #1a1a24;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: border-color 0.2s, background 0.2s;
    }
    .right-ctrl-row input[type="checkbox"]:hover {
      border-color: rgba(255, 255, 255, 0.25);
    }
    .right-ctrl-row input[type="checkbox"]:checked {
      background: #1a1a24;
      border-color: rgba(255, 255, 255, 0.25);
    }
    .right-ctrl-row input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 3px;
      height: 7px;
      border: solid #ddd;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    /* Flat graph canvas: */
    #graph-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      display: none;
      cursor: grab;
    }
    #graph-canvas:active { cursor: grabbing; }

    /* Light mode overrides */
    body.light { background: #cccccf; color: #333; }
    body.light #tooltip,
    body.light #info-popup {
      background: rgba(255, 255, 255, 0.95);
      border-color: rgba(0, 0, 0, 0.12);
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      color: #555;
    }
    body.light #tooltip .tt-header h3,
    body.light #info-popup h4 { color: #111; }
    body.light #tooltip .row { color: #666; }
    body.light #tooltip .row span,
    body.light #info-popup .row span { color: #222; }
    body.light #tooltip .tag { background: rgba(0,0,0,0.08); color: #444; }
    body.light #tooltip .divider,
    body.light #info-popup .divider { border-color: rgba(0,0,0,0.1); }
    body.light #hud h1 { color: #111; }
    body.light a { color: #999; }
    body.light a:hover { color: #555; }
    body.light .hud-icon-btn { color: #999; }
    body.light .hud-icon-btn.active { color: #111; }
    body.light #info-btn { color: #111; }
    body.light .right-ctrl-row { color: #555; }
    body.light .right-ctrl-row input[type="checkbox"] {
      background: #e0e0e0;
      border-color: rgba(0, 0, 0, 0.2);
    }
    body.light .right-ctrl-row input[type="checkbox"]:checked {
      background: #e0e0e0;
      border-color: rgba(0, 0, 0, 0.3);
    }
    body.light .right-ctrl-row input[type="checkbox"]:checked::after {
      border-color: #333;
    }
    body.light .ctrl-row select {
      background: #e0e0e0;
      border-color: rgba(0, 0, 0, 0.15);
      color: #333;
      color-scheme: light;
    }
    body.light .ctrl-row select option { background: #e0e0e0; color: #333; }
    body.light #hud .search-wrap input {
      background: #e0e0e0;
      border-color: rgba(0, 0, 0, 0.15);
      color: #333;
      color-scheme: light;
    }
    body.light #hud .search-wrap input::placeholder { color: #999; }
    body.light #hud .search-wrap .search-ghost { color: #aaa; }
    body.light #hud .search-wrap .search-count { color: #999; }
    body.light #legend::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.2); }
  </style>
</head>
<body>

  <div id="tooltip">
    <div class="tt-header">
      <h3 id="tt-title"></h3>
      <span class="tt-rating" id="tt-rating"></span>
    </div>
    <div id="tt-body"></div>
  </div>

  <canvas id="graph-canvas"></canvas>

  <div id="left-panel">
    <div id="hud">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:2px;">
        <h1>Zach's Wine Space</h1>
        <div class="hud-btn-row" style="margin-top:0;">
          <a class="hud-icon-btn" href="https://github.com/ZythiQ/wines-project" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" style="width:18px; height:18px;">
              <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.61.07-.61 1 .07 1.53 1.03 1.53 1.03.89 1.52 2.34 1.08 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.93 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.64 0 0 .84-.27 2.75 1.02A9.56 9.56 0 0 1 12 6.8c.85.004 1.71.115 2.51.34 1.91-1.29 2.75-1.02 2.75-1.02.55 1.37.2 2.39.1 2.64.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.68-4.57 4.93.36.31.68.92.68 1.85v2.74c0 .27.16.59.67.5A10.003 10.003 0 0 0 22 12c0-5.523-4.477-10-10-10z" fill="#fff" stroke="none"/>
            </svg>
          </a>
          <div id="info-btn">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="16" x2="12" y2="12"/>
              <line x1="12" y1="8" x2="12.01" y2="8"/>
            </svg>
            <div id="info-popup"></div>
          </div>
          <button class="hud-icon-btn" id="btn-theme" title="Toggle light/dark mode">
            <svg viewBox="0 0 24 24" style="fill: #fff; stroke: #fff;">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </button>
          <button class="hud-icon-btn" id="btn-home" style="transform: translateY(-1px);">
            <svg viewBox="1 2 22 19">
              <path d="M12 2L1 12h4v9h5v-6h4v6h5v-9h4L12 2z" fill="#fff" stroke="none"/>
            </svg>
          </button>
          <button class="hud-icon-btn active" id="btn-spin">
            <svg viewBox="0 0 24 24">
              <polyline points="23 4 23 10 17 10"/>
              <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
          </button>
          <a id="wine-count" href="wines.csv" download="wines.csv" style="margin-left: 4px;"></a>
        </div>
      </div>
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Search wines…" autocomplete="off" spellcheck="false" />
        <span class="search-ghost" id="search-ghost"></span>
        <span class="search-count" id="search-count"></span>
      </div>
    </div>
    <div class="ctrl-row">
      <select id="color-by">
        <option value="country">Country</option>
        <option value="grape">Grape</option>
        <option value="region">Region</option>
        <option value="color">Wine Color</option>
        <option value="sparkling">Sparkling</option>
        <option value="alcohol">Alcohol</option>
        <option value="price">Price</option>
        <option value="body">Body</option>
        <option value="acidity">Acidity</option>
        <option value="tannins">Tannins</option>
        <option value="dryness">Dryness</option>
        <option value="warmth">Warmth</option>
        <option value="length">Length</option>
        <option value="sentiment">My Rating</option>
      </select>
    </div>
    <div id="legend"></div>
  </div>

  <div id="controls">
    <div class="right-ctrl-row">
      <span>Show edges</span>
      <input type="checkbox" id="show-neighbors" checked />
    </div>
    <div class="right-ctrl-row">
      <span>Show labels</span>
      <input type="checkbox" id="show-labels" />
    </div>
    <div class="right-ctrl-row">
      <span>Flat view</span>
      <input type="checkbox" id="flatten-graph" />
    </div>
    <div class="right-ctrl-row">
      <span>My top</span>
      <input type="checkbox" id="glow-top-grape" />
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
  import * as THREE from "three";
  import { OrbitControls } from "three/addons/controls/OrbitControls.js";

  // ============== > Helpers:

  const titleCase = s => s.replace(/\b\w/g, c => c.toUpperCase());

  const rgbCss = ([r, g, b]) =>
    `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;

  const legendItem = (css, label) =>
    `<div class="legend-item"><div class="legend-dot" style="background:${css}"></div> ${label}</div>`;

  const srgbToLinear = c =>
    c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);

  function scaleLabel(v) {
    if (v <= 0.2) return "Low";
    if (v <= 0.3) return "Med\u2009−";
    if (v <= 0.5) return "Medium";
    if (v <= 0.7) return "Med\u2009+";
    return "High";
  }

  function clearGroup(group) {
    while (group.children.length) group.remove(group.children[0]);
  }

  // ============== > Config:

  const EDGE_OPACITY = 0.15;
  const GLOW_OPACITY = 0.8;
  const GLOW_RADIUS_FACTOR = 2;
  const DIM_OPACITY = 0.05;

  const RATING_ICONS = { "-2": "👎👎", "-1": "👎", "0": "", "1": "👍", "2": "👍👍" };

  const SENTIMENT = {
    "-2": { label: "Hate",       color: [1.0,  0.1,  0.1 ] },
    "-1": { label: "Dislike",    color: [0.45, 0.2,  0.15] },
     "0": { label: "Ambivalent", color: [0.16, 0.16, 0.14] },
     "1": { label: "Like",       color: [0.25, 0.45, 0.2 ] },
     "2": { label: "Love",       color: [0.1,  1.0,  0.2 ] },
  };

  const SPARKLING_COLORS = {
    yes: { label: "Sparkling", color: [1.0,  0.85, 0.2 ] },
    no:  { label: "Not",       color: [0.16, 0.16, 0.14] },
  };

  const WINE_COLOR_MAP = {
    "water white": "#f0eed8", "pale straw": "#f5f0c1", "straw": "#e8d44d",
    "golden straw": "#d4b830", "golden": "#c9a820", "deep gold": "#b8860b",
    "gold": "#d4a017", "amber": "#cf8a20", "pink": "#f4a6b0",
    "pale salmon": "#f0b8a8", "salmon": "#e88771", "copper": "#c07040",
    "pale ruby": "#c45070", "ruby": "#9b111e", "deep ruby": "#6b0a0e",
    "garnet": "#733635", "purple": "#5c2058", "deep purple": "#3a0e40",
    "brick red": "#8b4513", "blood red": "#880000", "maroon red": "#6c1f1f",
    "red": "#c0392b", "tawny": "#a05030", "brown": "#5c3317",
  };

  const CATEGORICAL_PALETTE = [
    "#e6194b", "#3cb44b", "#ffe119", "#4363d8", "#f58231",
    "#911eb4", "#42d4f4", "#f032e6", "#bfef45", "#fabed4",
    "#469990", "#dcbeff", "#9a6324", "#800000", "#aaffc3",
    "#808000", "#ffd8b1", "#000075", "#a9a9a9", "#fffac8",
    "#7cb9e8", "#c9ffe5", "#b5651d", "#ff6961",
  ];

  const INFO_CLOUD = `
    <h3>Cloud View</h3>
    <div class="divider"></div>
    <div class="row"><span>Left-click drag</span> to orbit the cloud.</div>
    <div class="row"><span>Right-click drag</span> to pan the cloud.</div>
    <div class="divider"></div>
    <div class="row"><span>Shft + drag</span> to flip mouse controls.</div>
    <div class="row"><span>Ctrl + drag</span> to roll the camera.</div>
    <div class="divider"></div>
    <div class="row"><span>Hover</span> a wine to see details.</div>
    <div class="row"><span>Scroll</span> to zoom in and out.</div>
    <div class="divider"></div>
    <div class="row">Use the <span>dropdown</span> to alter coloring.</div>
    <div class="row">Toggle <span>edges</span>, <span>labels</span>, and more.</div>
  `;

  const INFO_GRAPH = `
    <h3>Flat-Force View</h3>
    <div class="divider"></div>
    <div class="row"><span>Right-click</span> a wine to show context.</div>
    <div class="row"><span>Hover</span> wines to highlight related.</div>
    <div class="row"><span>Scroll</span> to zoom in and out.</div>
    <div class="divider"></div>
    <div class="row"><span>Drag</span> the background to pan.</div>
    <div class="row"><span>Drag</span> a node to reposition it.</div>
    <div class="divider"></div>
    <div class="row">Use the <span>dropdown</span> to alter coloring.</div>
    <div class="row">Toggle <span>edges</span>, <span>labels</span>, and more.</div>
  `;

  // ============== > Load data:

  const data = await (await fetch("wines_3d.json")).json();
  document.getElementById("wine-count").textContent = `${data.length} wines added`;

  const grapeCount = {};
  for (const w of data) grapeCount[w.grape] = (grapeCount[w.grape] || 0) + 1;
  const maxGrapeCount = Math.max(...Object.values(grapeCount));

  function findTopGrapes(wines) {
    const stats = {};

    for (const w of wines) {
      if (!stats[w.grape]) stats[w.grape] = { sum: 0, count: 0 };
      stats[w.grape].sum += w.rating;
      stats[w.grape].count++;
    }

    let maxAvg = -Infinity;

    for (const g in stats) {
      stats[g].avg = stats[g].sum / stats[g].count;
      if (stats[g].avg > maxAvg) maxAvg = stats[g].avg;
    }

    return new Set(Object.keys(stats).filter(g => stats[g].avg === maxAvg));
  }

  const topGrapes = findTopGrapes(data);
  const wineColors = new Array(data.length);

  // Deduplicated edges:
  const edges = [];
  { const seen = new Set();
    data.forEach((w, i) => {
      for (const j of (w.neighbors || [])) {
        const key = Math.min(i,j) + ":" + Math.max(i,j);

        if (!seen.has(key)) {
          seen.add(key);
          edges.push([i, j]);
        }
      }
    });
  }

  let showNeighbors = true;
  let showLabels = false;
  let showTopGlow = false;
  let isDark = true;
  let currentView = "cloud";

  // ============== > Search / Fuzzy filter:

  const SEARCH_KEYS = ["grape", "producer", "vintage", "country", "region"];

  const searchFields = data.map(w =>
    SEARCH_KEYS.map(k => String(w[k] || "").toLowerCase())
  );

  const allSearchTokens = [...new Set(
    data.flatMap(w => SEARCH_KEYS.map(k => String(w[k] || "").toLowerCase()).filter(Boolean))
  )].sort();

  let searchQuery = "";
  let searchMatchSet = null;

  function findAutocomplete(query) {
    if (!query) return null;
    const q = query.toLowerCase();
    return allSearchTokens.find(t => t.startsWith(q) && t.length > q.length) || null;
  }

  function updateSearch() {
    const q = searchQuery.trim().toLowerCase();
    searchCountEl.textContent = q ? String(searchMatchSet?.size ?? 0) : "";

    for (let i = 0; i < data.length; i++) {
      const matched = !searchMatchSet || searchMatchSet.has(i);
      const a = matched ? 1.0 : DIM_OPACITY;
      const [r, g, b] = wineColors[i] || [0.5, 0.5, 0.5];

      colors[i*3]   = r;
      colors[i*3+1] = g;
      colors[i*3+2] = b;
      alphas[i] = a;
    }
    geom.attributes.color.needsUpdate = true;
    geom.attributes.alpha.needsUpdate = true;
    buildGlowPoints();
    glowPoints.visible = showTopGlow || (searchMatchSet !== null && searchMatchSet.size > 0);

    if (labelGroup.visible) {
      labelGroup.children.forEach((sprite, i) => {
        sprite.visible = !searchMatchSet || searchMatchSet.has(i);
      });
    }
  }

  function runSearch(query) {
    searchQuery = query;
    const q = query.toLowerCase().trim();

    if (!q) { searchMatchSet = null; }
    else {
      searchMatchSet = new Set();
      for (let i = 0; i < data.length; i++)
        if (searchFields[i].some(f => f.includes(q))) searchMatchSet.add(i);
    }
    updateSearch();
  }

  function updateGhostText() {
    const val = searchInput.value;
    const completion = val && findAutocomplete(val);
    searchGhost.innerHTML = completion
      ? `<span style="visibility:hidden">${val.replace(/</g,"&lt;")}</span>${completion.slice(val.length).replace(/</g,"&lt;")}`
      : "";
  }

  const searchInput = document.getElementById("search-input");
  const searchGhost = document.getElementById("search-ghost");
  const searchCountEl = document.getElementById("search-count");

  searchInput.addEventListener("input", () => { runSearch(searchInput.value); updateGhostText(); });

  searchInput.addEventListener("keydown", e => {
    e.stopPropagation();
    if (e.key === "Tab") {
      const completion = searchInput.value && findAutocomplete(searchInput.value);
      if (completion) { e.preventDefault(); searchInput.value = completion; runSearch(completion); updateGhostText(); }
    }
    if (e.key === "Escape") { searchInput.value = ""; searchInput.blur(); runSearch(""); updateGhostText(); }
  });
  searchInput.addEventListener("keyup", e => e.stopPropagation());
  searchInput.addEventListener("keypress", e => e.stopPropagation());

  // ============== > Scene setup:

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0a0a0f);
  scene.fog = new THREE.FogExp2(0x0a0a0f, 0.012);

  const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
  camera.position.set(18, 0, 18);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.setPixelRatio(devicePixelRatio);
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.06;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.3;

  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
  dirLight.position.set(10, 20, 10);
  scene.add(dirLight);

  // ============== > Scale & center:

  const xs = data.map(d => d.x), ys = data.map(d => d.y), zs = data.map(d => d.z);

  const axisRange = (arr) => Math.max(...arr) - Math.min(...arr);
  const axisMid   = (arr) => (Math.max(...arr) + Math.min(...arr)) / 2;

  const S = 24 / Math.max(axisRange(xs), axisRange(ys), axisRange(zs));
  const cx = axisMid(xs), cy = axisMid(ys), cz = axisMid(zs);

  const pos = data.map(d => [
    (d.y - cy) * S,
    (d.x - cx) * S,
    -(d.z - cz) * S,
  ]);

  // ============== > Canvas texture helper:

  function makeCanvasTexture(size, draw) {
    const cv = document.createElement("canvas");
    cv.width = cv.height = size;
    draw(cv.getContext("2d"), size);
    return new THREE.CanvasTexture(cv);
  }

  // ============== > Point cloud:

  const circleTexture = makeCanvasTexture(64, (ctx, s) => {
    ctx.beginPath();
    ctx.arc(s/2, s/2, s/2 - 2, 0, Math.PI * 2);
    ctx.fillStyle = "#ffffff";
    ctx.fill();
  });

  const glowTexture = makeCanvasTexture(128, (ctx, s) => {
    const g = ctx.createRadialGradient(s/2, s/2, 0, s/2, s/2, s/2);
    g.addColorStop(0,   "rgba(255,255,255,0.6)");
    g.addColorStop(0.3, "rgba(255,255,255,0.2)");
    g.addColorStop(1,   "rgba(255,255,255,0.0)");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, s, s);
  });

  const geom = new THREE.BufferGeometry();
  const positions = new Float32Array(data.length * 3);
  const colors = new Float32Array(data.length * 3);
  const alphas = new Float32Array(data.length).fill(1.0);

  pos.forEach(([x, y, z], i) => {
    positions[i*3] = x;
    positions[i*3+1] = y;
    positions[i*3+2] = z;
  });
  geom.setAttribute("position", new THREE.BufferAttribute(positions, 3));
  geom.setAttribute("color",    new THREE.BufferAttribute(colors, 3));
  geom.setAttribute("alpha",    new THREE.BufferAttribute(alphas, 1));

  const pointMat = new THREE.ShaderMaterial({
    uniforms: {
      pointSize: { value: 0.6 },
      map: { value: circleTexture },
      scale: { value: window.innerHeight * 0.5 },
      fogColor: { value: new THREE.Vector3(10/255, 10/255, 15/255) },
      fogDensity: { value: scene.fog.density },
    },
    vertexShader: `
      attribute float alpha;
      varying vec3 vColor;
      varying float vAlpha;
      varying float vFogDepth;
      uniform float pointSize;
      uniform float scale;
      void main() {
        vColor = color;
        vAlpha = alpha;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        vFogDepth = -mvPosition.z;
        gl_PointSize = pointSize * scale / -mvPosition.z;
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      uniform sampler2D map;
      uniform vec3 fogColor;
      uniform float fogDensity;
      varying vec3 vColor;
      varying float vAlpha;
      varying float vFogDepth;
      void main() {
        vec4 texColor = texture2D(map, gl_PointCoord);
        if (texColor.a < 0.1) discard;
        float fogFactor = exp(-fogDensity * fogDensity * vFogDepth * vFogDepth);
        fogFactor = clamp(fogFactor, 0.0, 1.0);
        vec3 color = mix(fogColor, vColor, fogFactor);
        gl_FragColor = vec4(color, texColor.a * vAlpha * 0.9);
      }
    `,
    vertexColors: true,
    transparent: true,
    depthWrite: false,
  });

  const points = new THREE.Points(geom, pointMat);
  scene.add(points);

  // ============== > Glow layer:

  const glowMat = new THREE.PointsMaterial({
    vertexColors: true,
    sizeAttenuation: true,
    transparent: true,
    map: glowTexture,
    alphaMap: glowTexture,
    depthWrite: false,
    size: GLOW_RADIUS_FACTOR,
    opacity: GLOW_OPACITY,
    blending: THREE.AdditiveBlending,
  });

  const glowPoints = new THREE.Points(new THREE.BufferGeometry(), glowMat);
  glowPoints.visible = false;
  scene.add(glowPoints);

  function buildGlowPoints() {
    const glowPositions = [], glowColors = [];

    data.forEach((w, i) => {
      const isTop = showTopGlow && topGrapes.has(w.grape);
      const isSearchMatch = searchMatchSet !== null && searchMatchSet.has(i);

      if (searchMatchSet !== null) {
        if (!isSearchMatch) return;
        if (!isTop && !isSearchMatch) return;
      } else {
        if (!isTop) return;
      }

      const [r, g, b] = wineColors[i] || [0.7, 0.98, 0.81];
      
      glowPositions.push(...pos[i]);
      glowColors.push(r, g, b);
    });

    glowPoints.geometry.dispose();
    const newGeom = new THREE.BufferGeometry();

    newGeom.setAttribute("position", new THREE.Float32BufferAttribute(glowPositions, 3));
    newGeom.setAttribute("color", new THREE.Float32BufferAttribute(glowColors, 3));
    glowPoints.geometry = newGeom;
  }
  buildGlowPoints();

  // ============== > Neighbor lines:

  const lineGroup = new THREE.Group();
  scene.add(lineGroup);

  function buildNeighborLines() {
    clearGroup(lineGroup);

    for (const [i, j] of edges) {
      const ci = wineColors[i] || [0.3, 0.3, 0.4];
      const cj = wineColors[j] || [0.3, 0.3, 0.4];

      const lg = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(...pos[i]),
        new THREE.Vector3(...pos[j]),
      ]);
      lg.setAttribute("color", new THREE.BufferAttribute(new Float32Array([
        srgbToLinear(ci[0]), srgbToLinear(ci[1]), srgbToLinear(ci[2]),
        srgbToLinear(cj[0]), srgbToLinear(cj[1]), srgbToLinear(cj[2]),
      ]), 3));

      lineGroup.add(new THREE.Line(lg, new THREE.LineBasicMaterial({
        vertexColors: true, transparent: true, opacity: EDGE_OPACITY,
      })));
    }
  }
  buildNeighborLines();

  // ============== > Labels:

  const labelGroup = new THREE.Group();
  scene.add(labelGroup);

  function makeLabel(text, position, fillColor) {
    const cv = document.createElement("canvas");
    const ctx = cv.getContext("2d");

    cv.width = 512;
    cv.height = 64;
    ctx.font = "bold 28px system-ui, sans-serif";
    ctx.fillStyle = fillColor || "rgba(255,255,255,0.7)";
    ctx.fillText(text, 4, 42);

    const sprite = new THREE.Sprite(
      new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(cv), transparent: true, depthWrite: false })
    );

    sprite.position.set(position[0], position[1] + 0.9, position[2]);
    sprite.scale.set(5, 0.65, 1);
    return sprite;
  }

  function buildLabels() {
    clearGroup(labelGroup);
    const fillColor = isDark ? "rgba(255,255,255,0.7)" : "rgba(0,0,0,0.7)";
    data.forEach((w, i) => labelGroup.add(makeLabel(`${w.producer} ${w.vintage}`, pos[i], fillColor)));
  }
  buildLabels();
  labelGroup.visible = false;

  // ============== > Coloring:

  function setPointColor(i, r, g, b) {
    const matched = !searchMatchSet || searchMatchSet.has(i);
    wineColors[i] = [r, g, b];

    colors[i*3]   = r;
    colors[i*3+1] = g;
    colors[i*3+2] = b;
    alphas[i] = matched ? 1.0 : DIM_OPACITY;
  }

  function applyColors(field) {
    const legend = document.getElementById("legend");
    legend.innerHTML = "";

    if (field === "price") {
      const prices = data.map(d => d.price);
      const lo = Math.min(...prices), hi = Math.max(...prices);

      data.forEach((w, i) => {
        const t = hi > lo ? (w.price - lo) / (hi - lo) : 0.5;
        setPointColor(i, t, 1.0 - t, 0);
      });
      legend.innerHTML = legendItem(rgbCss([0, 1, 0]), `$${lo.toFixed(0)}`) +
                         legendItem(rgbCss([1, 0, 0]), `$${hi.toFixed(0)}`);

    } else if (field === "alcohol") {
      const alcohol = data.map(d => d.alcohol);
      const lo = Math.min(...alcohol), hi = Math.max(...alcohol);

      data.forEach((w, i) => {
        const t = hi > lo ? (w.alcohol - lo) / (hi - lo) : 0.5;
        setPointColor(i, t, 0.15, 1.0 - t);
      });
      legend.innerHTML = legendItem(rgbCss([0, 0.15, 1]), `${(lo * 100).toFixed(1)}%`) +
                         legendItem(rgbCss([1, 0.15, 0]), `${(hi * 100).toFixed(1)}%`);

    } else if (["body", "acidity", "tannins", "dryness", "length", "warmth"].includes(field)) {
      data.forEach((w, i) => setPointColor(i, w[field], 0.15, 1.0 - w[field]));
      legend.innerHTML = legendItem(rgbCss([0, 0.15, 1]), "Low") +
                         legendItem(rgbCss([1, 0.15, 0]), "High");

    } else if (field === "sentiment") {
      data.forEach((w, i) => {
        const s = SENTIMENT[String(w.rating)] || SENTIMENT["0"];
        setPointColor(i, ...s.color);
      });
      for (const key of ["-2", "-1", "0", "1", "2"]) {
        const s = SENTIMENT[key];
        legend.innerHTML += legendItem(rgbCss(s.color), s.label);
      }

    } else if (field === "sparkling") {
      data.forEach((w, i) => {
        const s = w.sparkling ? SPARKLING_COLORS.yes : SPARKLING_COLORS.no;
        setPointColor(i, ...s.color);
      });
      legend.innerHTML = legendItem(rgbCss(SPARKLING_COLORS.yes.color), SPARKLING_COLORS.yes.label) +
                         legendItem(rgbCss(SPARKLING_COLORS.no.color),  SPARKLING_COLORS.no.label);

    } else if (field === "color") {
      data.forEach((w, i) => {
        const c = new THREE.Color(WINE_COLOR_MAP[w.color] || "#888888");
        setPointColor(i, c.r, c.g, c.b);
      });
      [...new Set(data.map(d => d.color))].sort().forEach(name =>
        legend.innerHTML += legendItem(WINE_COLOR_MAP[name] || "#888", titleCase(name))
      );

    } else {
      // Categorical:
      const vals = [...new Set(data.map(d => d[field]))].sort();
      const map = Object.fromEntries(vals.map((v, i) => [v, CATEGORICAL_PALETTE[i % CATEGORICAL_PALETTE.length]]));

      data.forEach((w, i) => {
        const c = new THREE.Color(map[w[field]]);
        setPointColor(i, c.r, c.g, c.b);
      });
      vals.forEach(v => legend.innerHTML += legendItem(map[v], v));
    }

    geom.attributes.color.needsUpdate = true;
    geom.attributes.alpha.needsUpdate = true;
    buildNeighborLines();
    buildGlowPoints();
  }
  applyColors("country");

  // ============== > Tooltip:

  const tooltip  = document.getElementById("tooltip");
  const ttTitle  = document.getElementById("tt-title");
  const ttRating = document.getElementById("tt-rating");
  const ttBody   = document.getElementById("tt-body");

  function showTooltip(w, ex, ey) {
    const vintage = w.vintage ? ` ${w.vintage}` : "";
    ttTitle.textContent = `${w.producer},${vintage} ${w.grape}`;
    ttRating.textContent = RATING_ICONS[String(w.rating)] || "";

    const tags = arr => arr.map(s => `<span class="tag">${titleCase(s)}</span>`).join("");

    ttBody.innerHTML = `
      <div class="row">Region <span>${w.region}, ${w.country}</span></div>
      <div class="row">Color <span>${titleCase(w.color)}</span> • Price <span>$${w.price.toFixed(0)}</span> • ABV <span>${(w.alcohol*100).toFixed(1)}%</span>${w.sparkling ? " · 🫧 Sparkling" : ""}</div>
      <div class="divider"></div>
      <div class="row">Body <span>${scaleLabel(w.body)}</span> • Acidity <span>${scaleLabel(w.acidity)}</span> • Tannin <span>${scaleLabel(w.tannins)}</span></div>
      <div class="row">Dryness <span>${scaleLabel(w.dryness)}</span> • Length <span>${scaleLabel(w.length)}</span> • Warmth <span>${scaleLabel(w.warmth)}</span></div>
      <div class="divider"></div>
      <div class="tags">${tags(w.smells)}</div>
      <div class="divider"></div>
      <div class="tags">${tags(w.flavors)}</div>
    `;

    let tx = ex + 18, ty = ey - 14;
    if (tx + 350 > innerWidth)  tx = ex - 360;
    if (ty + 300 > innerHeight) ty = innerHeight - 310;
    if (ty < 10) ty = 10;
    tooltip.style.left = tx + "px";
    tooltip.style.top  = ty + "px";
    tooltip.style.display = "block";
  }

  function hideTooltip() { tooltip.style.display = "none"; }

  function isNodeInteractive(idx) {
    return !searchMatchSet || searchMatchSet.has(idx);
  }

  // ============== > Cloud hover:

  const raycaster = new THREE.Raycaster();
  raycaster.params.Points.threshold = 0.4;
  const mouse = new THREE.Vector2();
  let hoveredIdx = -1;

  window.addEventListener("mousemove", e => {
    if (currentView !== "cloud") return;

    mouse.x =  (e.clientX / innerWidth)  * 2 - 1;
    mouse.y = -(e.clientY / innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    const hits = raycaster.intersectObject(points);
    const validHit = hits.find(h => isNodeInteractive(h.index));

    if (validHit) {
      const idx = validHit.index;
      if (idx !== hoveredIdx) { hoveredIdx = idx; }

      showTooltip(data[idx], e.clientX, e.clientY);
      document.body.style.cursor = "pointer";

    } else {
      hideTooltip();
      hoveredIdx = -1;
      document.body.style.cursor = "default";
    }
  });

  // ============== > Cloud interaction:

  const btnSpin = document.getElementById("btn-spin");

  renderer.domElement.addEventListener("pointerdown", e => {
    if (e.button === 2) return;
    controls.autoRotate = false;
    btnSpin.classList.remove("active");
  });

  let isRolling = false, rollStartX = 0;

  renderer.domElement.addEventListener("pointerdown", e => {
    if (e.ctrlKey || e.metaKey) {
      isRolling = true;
      rollStartX = e.clientX;
      controls.enabled = false;
      e.preventDefault();
    }
  });

  window.addEventListener("pointermove", e => {
    if (!isRolling) return;
    const dx = e.clientX - rollStartX;

    rollStartX = e.clientX;

    const axis = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
    camera.up.applyAxisAngle(axis, dx * -0.005);
  });

  window.addEventListener("pointerup", () => {
    if (isRolling) {
      isRolling = false;
      controls.enabled = true;
    }
  });

  btnSpin.addEventListener("click", () => {
    controls.autoRotate = !controls.autoRotate;
    btnSpin.classList.toggle("active", controls.autoRotate);
  });

  // ============== > Home button:

  const DEFAULT_CAM_POS = new THREE.Vector3(18, 0, 18);
  const DEFAULT_CAM_UP  = new THREE.Vector3(0, 1, 0);

  document.getElementById("btn-home").addEventListener("click", () => {
    if (currentView === "cloud") {
      camera.position.copy(DEFAULT_CAM_POS);
      camera.up.copy(DEFAULT_CAM_UP);
      controls.target.set(0, 0, 0);
      controls.update();

    } else {
      fitZoom();
    }
  });

  // ============== > Flat graph:

  const graphCanvas = document.getElementById("graph-canvas");
  const gCtx = graphCanvas.getContext("2d");

  graphCanvas.addEventListener("contextmenu", e => e.preventDefault());

  const nodes = data.map((w, i) => ({
    i, x: 0, y: 0, vx: 0, vy: 0,
    radius: 4 + (grapeCount[w.grape] / maxGrapeCount) * 9,
  }));

  function initNodePositions() {
    const pad = 120;
    const dxs = data.map(d => d.x), dys = data.map(d => d.y);
    const minX = Math.min(...dxs), maxX = Math.max(...dxs);
    const minY = Math.min(...dys), maxY = Math.max(...dys);
    const s = Math.min((innerWidth-pad*2)/(maxX-minX||1), (innerHeight-pad*2)/(maxY-minY||1));
    const offX = (innerWidth  - (maxX-minX)*s) / 2;
    const offY = (innerHeight - (maxY-minY)*s) / 2;

    nodes.forEach((n, i) => {
      n.x = offX + (data[i].x - minX) * s;
      n.y = offY + (data[i].y - minY) * s;
      n.vx = n.vy = 0;
    });
  }

  const SIM = { repulsion: 3000, attraction: 0.005, idealLen: 90, damping: 0.88, centerPull: 0.001, maxV: 8 };
  let simTicks = 0;

  function simStep() {
    const N = nodes.length;
    const mx = innerWidth / 2, my = innerHeight / 2;

    for (let i = 0; i < N; i++) for (let j = i+1; j < N; j++) {
      const dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y;
      const d = Math.sqrt(dx*dx + dy*dy) || 1;
      const f = SIM.repulsion / (d*d);
      const fx = (dx/d)*f, fy = (dy/d)*f;

      nodes[i].vx -= fx;
      nodes[i].vy -= fy;
      nodes[j].vx += fx;
      nodes[j].vy += fy;
    }

    for (const [i, j] of edges) {
      const dx = nodes[j].x - nodes[i].x, dy = nodes[j].y - nodes[i].y;
      const d = Math.sqrt(dx*dx + dy*dy) || 1;
      const f = (d - SIM.idealLen) * SIM.attraction;
      const fx = (dx/d)*f, fy = (dy/d)*f;

      nodes[i].vx += fx;
      nodes[i].vy += fy;
      nodes[j].vx -= fx;
      nodes[j].vy -= fy;
    }

    for (const n of nodes) {
      n.vx += (mx - n.x) * SIM.centerPull;
      n.vy += (my - n.y) * SIM.centerPull;
      n.vx *= SIM.damping;
      n.vy *= SIM.damping;

      const sp = Math.sqrt(n.vx*n.vx + n.vy*n.vy);

      if (sp > SIM.maxV) {
        n.vx = (n.vx/sp)*SIM.maxV;
        n.vy = (n.vy/sp)*SIM.maxV;
      }
      n.x += n.vx;
      n.y += n.vy;
    }
    simTicks++;
  }

  let gZoom = 1, gPanX = 0, gPanY = 0;
  let gDragging = false, gDragSX = 0, gDragSY = 0, gPanSX = 0, gPanSY = 0;
  let gDragNode = null, gHoverIdx = -1, gLockedIdx = -1;
  let gRebounding = false;

  const s2w = (sx, sy) => [(sx - gPanX) / gZoom, (sy - gPanY) / gZoom];

  function nodeAt(sx, sy) {
    const [wx, wy] = s2w(sx, sy);

    for (let i = nodes.length-1; i >= 0; i--) {
      if (!isNodeInteractive(i)) continue;

      const n = nodes[i], dx = n.x - wx, dy = n.y - wy;

      if (dx*dx + dy*dy < (n.radius+4)**2) return i;
    }
    return -1;
  }

  function fitZoom() {
    if (!nodes.length) return;
    let mnX = Infinity, mxX = -Infinity, mnY = Infinity, mxY = -Infinity;

    for (const n of nodes) {
      if (n.x < mnX) mnX = n.x;
      if (n.x > mxX) mxX = n.x;
      if (n.y < mnY) mnY = n.y;
      if (n.y > mxY) mxY = n.y;
    }

    gZoom = Math.min((innerWidth-120)/(mxX-mnX||1), (innerHeight-120)/(mxY-mnY||1), 1) * 0.85;
    gPanX = innerWidth/2  - ((mnX+mxX)/2) * gZoom;
    gPanY = innerHeight/2 - ((mnY+mxY)/2) * gZoom;
  }

  function drawEdgeFlat(i, j, alpha, width) {
    const ni = nodes[i], nj = nodes[j];
    const ci = wineColors[i] || [0.3, 0.3, 0.4];
    const cj = wineColors[j] || [0.3, 0.3, 0.4];
    const lg = gCtx.createLinearGradient(ni.x, ni.y, nj.x, nj.y);

    lg.addColorStop(0, `rgba(${ci[0]*255|0},${ci[1]*255|0},${ci[2]*255|0},${alpha})`);
    lg.addColorStop(1, `rgba(${cj[0]*255|0},${cj[1]*255|0},${cj[2]*255|0},${alpha})`);
    gCtx.beginPath();
    gCtx.moveTo(ni.x, ni.y);
    gCtx.lineTo(nj.x, nj.y);
    gCtx.strokeStyle = lg;
    gCtx.lineWidth = width;
    gCtx.stroke();
  }

  function drawGraph() {
    gCtx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    gCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);
    gCtx.save();
    gCtx.translate(gPanX, gPanY);
    gCtx.scale(gZoom, gZoom);

    const activeIdx  = gLockedIdx >= 0 ? gLockedIdx : gHoverIdx;
    const activeNbrs = activeIdx >= 0 ? new Set(data[activeIdx].neighbors || []) : null;

    if (showNeighbors) {
      if (activeIdx >= 0) {
        for (const j of data[activeIdx].neighbors || [])
          if (j !== activeIdx) drawEdgeFlat(activeIdx, j, 0.6, 2);
      } else {
        for (const [i, j] of edges) drawEdgeFlat(i, j, EDGE_OPACITY, 0.8);
      }
    }

    const labelFillActive = isDark ? "rgba(255,255,255,0.95)" : "rgba(0,0,0,0.95)";
    const labelFillNormal = isDark ? "rgba(255,255,255,0.7)" : "rgba(0,0,0,0.7)";

    for (let idx = 0; idx < nodes.length; idx++) {
      const n = nodes[idx];
      const c = wineColors[idx] || [0.5, 0.5, 0.5];
      const isActive = idx === activeIdx;
      const isNbr = activeNbrs && activeNbrs.has(idx);

      let alpha;

      if (searchMatchSet !== null) {
        const searchAlpha = searchMatchSet.has(idx) ? 0.9 : DIM_OPACITY;

        if (activeIdx >= 0 && !isActive && !isNbr) {
          alpha = Math.min(searchAlpha, DIM_OPACITY);
        } else {
          alpha = searchAlpha;
        }
      } else {
        alpha = (activeIdx >= 0 && !isActive && !isNbr) ? DIM_OPACITY : 0.9;
      }

      const r = isActive ? n.radius * 1.3 : n.radius;
      const isTopGlow = showTopGlow && topGrapes.has(data[idx].grape);
      const isSearchGlow = searchMatchSet !== null && searchMatchSet.has(idx);
      
      const shouldGlow = isSearchGlow || (isTopGlow && !searchMatchSet);
      const shouldGlowFinal = shouldGlow || (isTopGlow && isSearchGlow);

      if (shouldGlowFinal) {
        const [tgR, tgG, tgB] = c.map(v => v * 255 | 0);
        const gr = gCtx.createRadialGradient(n.x, n.y, r, n.x, n.y, r*GLOW_RADIUS_FACTOR);

        gr.addColorStop(0, `rgba(${tgR},${tgG},${tgB},${GLOW_OPACITY})`);
        gr.addColorStop(1, `rgba(${tgR},${tgG},${tgB},0)`);
        gCtx.beginPath();
        gCtx.arc(n.x, n.y, r*GLOW_RADIUS_FACTOR, 0, Math.PI*2);
        gCtx.fillStyle = gr;
        gCtx.fill();
      }

      gCtx.beginPath();
      gCtx.arc(n.x, n.y, r, 0, Math.PI*2);
      gCtx.fillStyle = `rgba(${c[0]*255|0},${c[1]*255|0},${c[2]*255|0},${alpha})`;
      gCtx.fill();

      const nodeMatchesSearch = !searchMatchSet || searchMatchSet.has(idx);

      if ((showLabels && nodeMatchesSearch) || isActive || isNbr) {
        gCtx.font = `${isActive ? "bold " : ""}${isActive ? 11 : 9}px system-ui, sans-serif`;
        gCtx.fillStyle = isActive ? labelFillActive : labelFillNormal;
        gCtx.textAlign = "center";
        gCtx.fillText(`${data[idx].producer} (${data[idx].grape})`, n.x, n.y - r - 6);
      }
    }

    gCtx.restore();
  }

  // Flat graph pointer events:
  graphCanvas.addEventListener("pointerdown", e => {
    if (e.button === 2) {
      const idx = nodeAt(e.clientX, e.clientY);
      if (idx >= 0) {
        if (gLockedIdx === idx) {
          gLockedIdx = -1; hideTooltip();
        }
        else {
          gLockedIdx = idx;
          showTooltip(data[idx], e.clientX, e.clientY);
        }
      } else {
        gLockedIdx = -1;
        hideTooltip();
      }
      return;
    }

    const idx = nodeAt(e.clientX, e.clientY);

    if (gLockedIdx >= 0 && idx !== gLockedIdx) {
      gLockedIdx = -1;
      hideTooltip();
    }

    if (idx >= 0) {
      gDragNode = idx;
      graphCanvas.style.cursor = "grabbing";

    } else {
      gDragging = true;
      gDragSX = e.clientX;
      gDragSY = e.clientY;
      gPanSX = gPanX;
      gPanSY = gPanY;
    }
  });

  graphCanvas.addEventListener("pointermove", e => {
    if (gDragNode !== null) {
      const [wx, wy] = s2w(e.clientX, e.clientY);
      nodes[gDragNode].x = wx;
      nodes[gDragNode].y = wy;
      nodes[gDragNode].vx = nodes[gDragNode].vy = 0;

    } else if (gDragging) {
      gPanX = gPanSX + (e.clientX - gDragSX);
      gPanY = gPanSY + (e.clientY - gDragSY);

    } else {
      gHoverIdx = nodeAt(e.clientX, e.clientY);
      graphCanvas.style.cursor = gHoverIdx >= 0 ? "pointer" : "grab";
    }
  });

  graphCanvas.addEventListener("pointerup", () => {
    if (gDragNode !== null) {
      gRebounding = true;
      simTicks = 0;
    }
    gDragging = false;
    gDragNode = null;
    graphCanvas.style.cursor = "grab";
  });

  graphCanvas.addEventListener("wheel", e => {
    e.preventDefault();
    const f = e.deltaY < 0 ? 1.1 : 0.9, old = gZoom;

    gZoom = Math.max(0.15, Math.min(5, gZoom * f));
    gPanX = e.clientX - (e.clientX - gPanX) * (gZoom / old);
    gPanY = e.clientY - (e.clientY - gPanY) * (gZoom / old);

  }, { passive: false });

  // ============== > View switching:

  let graphAnimId = null;

  function resizeGraph() {
    graphCanvas.width  = innerWidth  * devicePixelRatio;
    graphCanvas.height = innerHeight * devicePixelRatio;
    graphCanvas.style.width  = innerWidth  + "px";
    graphCanvas.style.height = innerHeight + "px";
  }

  function startGraph() {
    resizeGraph(); initNodePositions();
    simTicks = 0;

    for (let i = 0; i < 300; i++) simStep();
    fitZoom();

    (function loop() {
      if (currentView !== "graph") return;
      if (gDragNode === null && (simTicks < 600 || gRebounding)) {
        for (let i = 0; i < 2; i++) simStep();

        if (gRebounding && simTicks > 60) {
          const maxV = Math.max(...nodes.map(n => Math.abs(n.vx) + Math.abs(n.vy)));
          if (maxV < 0.05) gRebounding = false;
        }
      }

      drawGraph();
      graphAnimId = requestAnimationFrame(loop);
    })();
  }

  function stopGraph() {
    if (graphAnimId) {
      cancelAnimationFrame(graphAnimId);
      graphAnimId = null;
    }
  }

  function switchView(view) {
    if (view === currentView) return;

    currentView = view;
    gLockedIdx = -1;
    gHoverIdx = -1;

    hideTooltip();

    if (view === "graph") {
      renderer.domElement.style.display = "none";
      graphCanvas.style.display = "block";
      btnSpin.style.display = "none";
      startGraph();

      infoPopup.innerHTML = INFO_GRAPH;

    } else {
      stopGraph();
      buildNeighborLines();

      graphCanvas.style.display = "none";
      renderer.domElement.style.display = "block";
      btnSpin.style.display = "";

      infoPopup.innerHTML = INFO_CLOUD;
    }
  }

  // ============== > Theme toggle:

  const btnTheme = document.getElementById("btn-theme");
  const sunHTML = btnTheme.innerHTML;
  const moonHTML = `<svg viewBox="0 0 24 24" style="fill: #fff; stroke: #fff;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>`;

  btnTheme.addEventListener("click", () => {
    isDark = !isDark;
    document.body.classList.toggle("light", !isDark);
    btnTheme.innerHTML = isDark ? sunHTML : moonHTML;

    const bgCSS = getComputedStyle(document.body).backgroundColor;
    const [r, g, b] = bgCSS.match(/\d+/g).map(Number);
    const bgHex = (r << 16) | (g << 8) | b;
    
    scene.background = new THREE.Color(bgHex);
    scene.fog = new THREE.FogExp2(bgHex, 0.012);

    pointMat.uniforms.fogColor.value.set(r / 255, g / 255, b / 255);
    pointMat.uniforms.fogDensity.value = scene.fog.density;

    const iconFill = isDark ? "#fff" : "#111";
    const ghPath = document.querySelector("#left-panel .hud-btn-row a svg path");

    if (ghPath) ghPath.setAttribute("fill", iconFill);
    const homePath = document.querySelector("#btn-home svg path");

    if (homePath) homePath.setAttribute("fill", iconFill);

    const themeSvg = btnTheme.querySelector("svg");
    if (themeSvg) {
      themeSvg.style.fill = iconFill;
      themeSvg.style.stroke = iconFill;
    }

    buildLabels();
    labelGroup.visible = showLabels;
  });

  const infoPopup = document.getElementById("info-popup");
  infoPopup.innerHTML = INFO_CLOUD;

  // ============== > Wire controls:

  document.getElementById("color-by").addEventListener("change", e => applyColors(e.target.value));
  document.getElementById("show-neighbors").addEventListener("change", e => {
    showNeighbors = e.target.checked;
    lineGroup.visible = e.target.checked;
  });
  document.getElementById("show-labels").addEventListener("change", e => {
    showLabels = e.target.checked;
    labelGroup.visible = e.target.checked;
    if (e.target.checked) {
      labelGroup.children.forEach((sprite, i) => {
        sprite.visible = !searchMatchSet || searchMatchSet.has(i);
      });
    }
  });
  document.getElementById("flatten-graph").addEventListener("change", e => switchView(e.target.checked ? "graph" : "cloud"));
  document.getElementById("glow-top-grape").addEventListener("change", e => {
      showTopGlow = e.target.checked;
      buildGlowPoints();
      glowPoints.visible = showTopGlow || (searchMatchSet !== null && searchMatchSet.size > 0);
  });

  // ============== > Render loop:

  window.addEventListener("resize", () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    pointMat.uniforms.scale.value = window.innerHeight * 0.5;

    if (currentView === "graph") {
      resizeGraph();
      fitZoom();
    }
  });

  (function animate() {
    requestAnimationFrame(animate);
    if (currentView !== "cloud") return;
    controls.update();
    renderer.render(scene, camera);
  })();
  </script>
</body>
</html>
